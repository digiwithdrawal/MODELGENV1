<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cloud Character Converter</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #ff6a00;
    color: #1b0c00;
  }

  header {
    padding: 18px;
    background: #ff8a00;
    border-bottom: 4px solid #1b0c00;
    text-align: center;
    font-size: 28px;
    font-weight: 900;
    letter-spacing: 1px;
  }

  main {
    display: grid;
    grid-template-columns: 340px 1fr;
    gap: 16px;
    padding: 16px;
  }

  .panel {
    background: #ffd38a;
    border: 4px solid #1b0c00;
    border-radius: 18px;
    padding: 14px;
    box-shadow: 6px 6px 0 #1b0c00;
  }

  .viewer {
    height: 76vh;
    background: #ffe7b5;
    border: 4px solid #1b0c00;
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 6px 6px 0 #1b0c00;
  }

  label {
    display: block;
    font-weight: 800;
    margin-top: 14px;
  }

  input, select, button {
    width: 100%;
    margin-top: 6px;
    padding: 10px;
    border: 3px solid #1b0c00;
    border-radius: 12px;
    background: #fff0c7;
    font-weight: 800;
  }

  button {
    cursor: pointer;
    background: #ff9f1c;
  }

  button:hover {
    background: #ffb84d;
  }

  .small {
    font-size: 13px;
    font-weight: 700;
    line-height: 1.35;
  }

  .row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
</style>
</head>

<body>
<header>CLOUD CHARACTER CONVERTER</header>

<main>
  <section class="panel">
    <p class="small">
      Upload OC sheet images, sample colors, choose a base, adjust face parts, then export GLB.
      This creates a visible anime-style base with separate eyes, brows, and mouth.
    </p>

    <label>Front View</label>
    <input type="file" id="frontUpload" accept="image/*">

    <label>Side View</label>
    <input type="file" id="sideUpload" accept="image/*">

    <label>Back View</label>
    <input type="file" id="backUpload" accept="image/*">

    <button id="sampleColors">Sample Colors From Front Image</button>

    <label>Base Type</label>
    <select id="baseType">
      <option value="male">Male Anime Base</option>
      <option value="female">Female Anime Base</option>
      <option value="muscular">Muscular Male Base</option>
    </select>

    <label>Skin Color</label>
    <input type="color" id="skinColor" value="#f0b48a">

    <label>Hair Color</label>
    <input type="color" id="hairColor" value="#17120f">

    <label>Eye Color</label>
    <input type="color" id="eyeColor" value="#2e7cff">

    <label>Clothing Color</label>
    <input type="color" id="clothColor" value="#252525">

    <div class="row">
      <div>
        <label>Eye Size</label>
        <input type="range" id="eyeSize" min="0.6" max="1.8" step="0.05" value="1">
      </div>
      <div>
        <label>Eye Spacing</label>
        <input type="range" id="eyeSpacing" min="0.5" max="1.6" step="0.05" value="1">
      </div>
    </div>

    <div class="row">
      <div>
        <label>Mouth Width</label>
        <input type="range" id="mouthWidth" min="0.5" max="1.8" step="0.05" value="1">
      </div>
      <div>
        <label>Mouth Height</label>
        <input type="range" id="mouthHeight" min="0.5" max="1.5" step="0.05" value="1">
      </div>
    </div>

    <label>Expression</label>
    <select id="expression">
      <option value="neutral">Neutral</option>
      <option value="happy">Happy</option>
      <option value="angry">Angry</option>
      <option value="sad">Sad</option>
      <option value="open">Open Mouth</option>
    </select>

    <button id="rebuild">Rebuild Character</button>
    <button id="exportGLB">Export GLB</button>
  </section>

  <section class="viewer" id="viewer"></section>
</main>

<script type="module">
import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";
import { GLTFExporter } from "https://unpkg.com/three@0.160.0/examples/jsm/exporters/GLTFExporter.js";

let scene, camera, renderer, controls;
let character;
let uploadedFrontImage = null;

const viewer = document.getElementById("viewer");

init();
buildCharacter();

function init() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color("#ffe7b5");

  camera = new THREE.PerspectiveCamera(45, viewer.clientWidth / viewer.clientHeight, 0.1, 100);
  camera.position.set(0, 2.2, 6);

  renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
  renderer.setSize(viewer.clientWidth, viewer.clientHeight);
  viewer.appendChild(renderer.domElement);

  controls = new OrbitControls(camera, renderer.domElement);
  controls.target.set(0, 1.6, 0);
  controls.update();

  const hemi = new THREE.HemisphereLight(0xffffff, 0x442200, 2.4);
  scene.add(hemi);

  const dir = new THREE.DirectionalLight(0xffffff, 2);
  dir.position.set(4, 6, 5);
  scene.add(dir);

  const grid = new THREE.GridHelper(8, 8, 0x8a4a00, 0x8a4a00);
  scene.add(grid);

  window.addEventListener("resize", resize);
  animate();
}

function resize() {
  camera.aspect = viewer.clientWidth / viewer.clientHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(viewer.clientWidth, viewer.clientHeight);
}

function mat(color, roughness = 0.65) {
  return new THREE.MeshStandardMaterial({
    color,
    roughness,
    metalness: 0.02
  });
}

function toonMat(color) {
  return new THREE.MeshToonMaterial({ color });
}

function createOval(name, sx, sy, sz, color) {
  const geo = new THREE.SphereGeometry(1, 32, 24);
  const mesh = new THREE.Mesh(geo, toonMat(color));
  mesh.name = name;
  mesh.scale.set(sx, sy, sz);
  return mesh;
}

function createCapsule(name, radius, depth, color) {
  const geo = new THREE.CapsuleGeometry(radius, depth, 16, 32);
  const mesh = new THREE.Mesh(geo, toonMat(color));
  mesh.name = name;
  return mesh;
}

function addOutline(mesh, scale = 1.035) {
  const outline = mesh.clone();
  outline.name = mesh.name + "_Outline";
  outline.material = new THREE.MeshBasicMaterial({
    color: 0x120700,
    side: THREE.BackSide
  });
  outline.scale.multiplyScalar(scale);
  mesh.add(outline);
}

function buildCharacter() {
  if (character) scene.remove(character);

  character = new THREE.Group();
  character.name = "Cloud_Anime_Character";

  const skin = document.getElementById("skinColor").value;
  const hair = document.getElementById("hairColor").value;
  const eyes = document.getElementById("eyeColor").value;
  const cloth = document.getElementById("clothColor").value;
  const base = document.getElementById("baseType").value;

  let bodyWidth = base === "muscular" ? 1.05 : 0.78;
  let waistWidth = base === "female" ? 0.58 : 0.68;
  let heightBoost = base === "female" ? -0.05 : 0;

  // Body
  const torso = createOval("Separate_Body_Torso", bodyWidth, 1.0, 0.36, cloth);
  torso.position.y = 1.45 + heightBoost;
  addOutline(torso);
  character.add(torso);

  const hips = createOval("Separate_Hips", waistWidth, 0.38, 0.32, cloth);
  hips.position.y = 0.72 + heightBoost;
  addOutline(hips);
  character.add(hips);

  const neck = createCapsule("Neck", 0.16, 0.18, skin);
  neck.position.y = 2.33 + heightBoost;
  character.add(neck);

  const head = createOval("Clean_Anime_Head_Base", 0.58, 0.72, 0.48, skin);
  head.position.y = 2.92 + heightBoost;
  addOutline(head);
  character.add(head);

  // Arms
  const armL = createCapsule("Left_Arm", 0.13, 1.05, skin);
  armL.rotation.z = -0.15;
  armL.position.set(-bodyWidth - 0.14, 1.42 + heightBoost, 0);
  character.add(armL);

  const armR = armL.clone();
  armR.name = "Right_Arm";
  armR.position.x *= -1;
  armR.rotation.z *= -1;
  character.add(armR);

  // Legs
  const legL = createCapsule("Left_Leg", 0.16, 1.15, cloth);
  legL.position.set(-0.23, 0.02 + heightBoost, 0);
  character.add(legL);

  const legR = legL.clone();
  legR.name = "Right_Leg";
  legR.position.x = 0.23;
  character.add(legR);

  // Shoes
  const shoeGeo = new THREE.BoxGeometry(0.36, 0.16, 0.62);
  const shoeMat = toonMat("#111111");
  const shoeL = new THREE.Mesh(shoeGeo, shoeMat);
  shoeL.name = "Left_Shoe";
  shoeL.position.set(-0.23, -0.65 + heightBoost, 0.1);
  character.add(shoeL);

  const shoeR = shoeL.clone();
  shoeR.name = "Right_Shoe";
  shoeR.position.x = 0.23;
  character.add(shoeR);

  // Hair cap
  const hairCap = createOval("Anime_Hair_Cap", 0.62, 0.35, 0.52, hair);
  hairCap.position.set(0, 3.33 + heightBoost, -0.02);
  addOutline(hairCap);
  character.add(hairCap);

  // Hair spikes
  for (let i = 0; i < 9; i++) {
    const spikeGeo = new THREE.ConeGeometry(0.11, 0.55, 8);
    const spike = new THREE.Mesh(spikeGeo, toonMat(hair));
    spike.name = "Procedural_Hair_Spike_" + i;
    const x = (i - 4) * 0.12;
    spike.position.set(x, 3.18 + heightBoost, 0.28);
    spike.rotation.x = Math.PI / 2.7;
    spike.rotation.z = (i - 4) * 0.12;
    character.add(spike);
  }

  // Separate eyes
  const eyeSize = parseFloat(document.getElementById("eyeSize").value);
  const eyeSpacing = parseFloat(document.getElementById("eyeSpacing").value);

  const eyeGeo = new THREE.SphereGeometry(0.1, 32, 16);
  const eyeMat = toonMat(eyes);

  const eyeL = new THREE.Mesh(eyeGeo, eyeMat);
  eyeL.name = "LEFT_SEPARATE_EYE_MESH";
  eyeL.scale.set(1.25 * eyeSize, 1.85 * eyeSize, 0.18);
  eyeL.position.set(-0.2 * eyeSpacing, 2.98 + heightBoost, 0.455);
  character.add(eyeL);

  const eyeR = eyeL.clone();
  eyeR.name = "RIGHT_SEPARATE_EYE_MESH";
  eyeR.position.x = 0.2 * eyeSpacing;
  character.add(eyeR);

  // Pupils
  const pupilGeo = new THREE.SphereGeometry(0.035, 16, 8);
  const pupilMat = toonMat("#050505");

  const pupilL = new THREE.Mesh(pupilGeo, pupilMat);
  pupilL.name = "Left_Pupil";
  pupilL.scale.set(1, 1.5, 0.12);
  pupilL.position.set(-0.2 * eyeSpacing, 2.98 + heightBoost, 0.49);
  character.add(pupilL);

  const pupilR = pupilL.clone();
  pupilR.name = "Right_Pupil";
  pupilR.position.x = 0.2 * eyeSpacing;
  character.add(pupilR);

  // Brows
  const browGeo = new THREE.BoxGeometry(0.23, 0.035, 0.035);
  const browMat = toonMat(hair);

  const browL = new THREE.Mesh(browGeo, browMat);
  browL.name = "Left_Separate_Brow";
  browL.position.set(-0.2 * eyeSpacing, 3.18 + heightBoost, 0.49);
  browL.rotation.z = 0.12;
  character.add(browL);

  const browR = browL.clone();
  browR.name = "Right_Separate_Brow";
  browR.position.x = 0.2 * eyeSpacing;
  browR.rotation.z = -0.12;
  character.add(browR);

  // Mouth
  const mouthWidth = parseFloat(document.getElementById("mouthWidth").value);
  const mouthHeight = parseFloat(document.getElementById("mouthHeight").value);
  const mouthGeo = new THREE.BoxGeometry(0.28 * mouthWidth, 0.045 * mouthHeight, 0.035);
  const mouth = new THREE.Mesh(mouthGeo, toonMat("#210600"));
  mouth.name = "SEPARATE_MOUTH_MESH";
  mouth.position.set(0, 2.68 + heightBoost, 0.49);
  character.add(mouth);

  applyExpression();

  scene.add(character);
}

function applyExpression() {
  if (!character) return;

  const exp = document.getElementById("expression").value;

  const mouth = character.getObjectByName("SEPARATE_MOUTH_MESH");
  const eyeL = character.getObjectByName("LEFT_SEPARATE_EYE_MESH");
  const eyeR = character.getObjectByName("RIGHT_SEPARATE_EYE_MESH");
  const browL = character.getObjectByName("Left_Separate_Brow");
  const browR = character.getObjectByName("Right_Separate_Brow");

  if (!mouth || !eyeL || !eyeR || !browL || !browR) return;

  mouth.scale.set(1,1,1);
  eyeL.scale.y = parseFloat(document.getElementById("eyeSize").value) * 1.85;
  eyeR.scale.y = parseFloat(document.getElementById("eyeSize").value) * 1.85;
  browL.rotation.z = 0.12;
  browR.rotation.z = -0.12;

  if (exp === "happy") {
    mouth.scale.set(1.4, 1.8, 1);
    mouth.rotation.z = 0;
    browL.position.y += 0.03;
    browR.position.y += 0.03;
  }

  if (exp === "angry") {
    browL.rotation.z = -0.35;
    browR.rotation.z = 0.35;
    eyeL.scale.y *= 0.55;
    eyeR.scale.y *= 0.55;
    mouth.scale.set(0.9, 0.7, 1);
  }

  if (exp === "sad") {
    browL.rotation.z = 0.45;
    browR.rotation.z = -0.45;
    mouth.rotation.z = 0.08;
    mouth.scale.set(0.9, 0.7, 1);
  }

  if (exp === "open") {
    mouth.geometry.dispose();
    mouth.geometry = new THREE.SphereGeometry(0.13, 24, 12);
    mouth.scale.set(0.85, 1.25, 0.18);
  }
}

function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}

document.getElementById("rebuild").addEventListener("click", buildCharacter);
document.getElementById("baseType").addEventListener("change", buildCharacter);
document.getElementById("skinColor").addEventListener("input", buildCharacter);
document.getElementById("hairColor").addEventListener("input", buildCharacter);
document.getElementById("eyeColor").addEventListener("input", buildCharacter);
document.getElementById("clothColor").addEventListener("input", buildCharacter);
document.getElementById("eyeSize").addEventListener("input", buildCharacter);
document.getElementById("eyeSpacing").addEventListener("input", buildCharacter);
document.getElementById("mouthWidth").addEventListener("input", buildCharacter);
document.getElementById("mouthHeight").addEventListener("input", buildCharacter);
document.getElementById("expression").addEventListener("change", buildCharacter);

document.getElementById("frontUpload").addEventListener("change", e => {
  const file = e.target.files[0];
  if (!file) return;
  const img = new Image();
  img.onload = () => uploadedFrontImage = img;
  img.src = URL.createObjectURL(file);
});

document.getElementById("sampleColors").addEventListener("click", () => {
  if (!uploadedFrontImage) {
    alert("Upload a front image first.");
    return;
  }

  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");
  canvas.width = uploadedFrontImage.width;
  canvas.height = uploadedFrontImage.height;
  ctx.drawImage(uploadedFrontImage, 0, 0);

  const skin = sampleAverage(ctx, canvas.width * 0.5, canvas.height * 0.35, 40);
  const hair = sampleAverage(ctx, canvas.width * 0.5, canvas.height * 0.18, 45);
  const cloth = sampleAverage(ctx, canvas.width * 0.5, canvas.height * 0.65, 60);

  document.getElementById("skinColor").value = skin;
  document.getElementById("hairColor").value = hair;
  document.getElementById("clothColor").value = cloth;

  buildCharacter();
});

function sampleAverage(ctx, cx, cy, size) {
  const data = ctx.getImageData(
    Math.max(0, cx - size / 2),
    Math.max(0, cy - size / 2),
    size,
    size
  ).data;

  let r = 0, g = 0, b = 0, count = 0;

  for (let i = 0; i < data.length; i += 4) {
    const alpha = data[i + 3];
    if (alpha < 50) continue;

    r += data[i];
    g += data[i + 1];
    b += data[i + 2];
    count++;
  }

  if (!count) return "#ffffff";

  r = Math.round(r / count);
  g = Math.round(g / count);
  b = Math.round(b / count);

  return "#" + [r, g, b].map(v => v.toString(16).padStart(2, "0")).join("");
}

document.getElementById("exportGLB").addEventListener("click", () => {
  const exporter = new GLTFExporter();

  exporter.parse(
    character,
    result => {
      const blob = new Blob([result], { type: "model/gltf-binary" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "cloud_anime_character.glb";
      a.click();
      URL.revokeObjectURL(url);
    },
    error => {
      console.error(error);
      alert("Export failed. Check console.");
    },
    { binary: true }
  );
});
</script>
</body>
</html>
